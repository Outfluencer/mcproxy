name: Release to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set release version
        run: mvn -B -ntp versions:set -DnewVersion=${{ inputs.version }} -DprocessAllModules=true -DgenerateBackupPoms=false

      - name: Publish to Maven Central
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: mvn -B -ntp -e -Prelease,central-portal deploy

      - name: Tag release
        run: |
          git config user.name "Outfluencer"
          git config user.email "git@outfluencer.dev"
          git tag -a v${{ inputs.version }} -m "Release ${{ inputs.version }}"
          git push origin v${{ inputs.version }}
